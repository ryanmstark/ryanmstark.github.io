<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 10</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #fff;
      color: #000;
      padding: 20px;
      max-width: 1024px;
      margin: 0 auto;
    }

    nav { margin-bottom: 16px; font-size: 0.85rem; }
    nav a { color: #000; }

    h1 { margin-bottom: 16px; font-size: 1.3rem; }

    button {
      border: 1px solid #000;
      background: #fff;
      color: #000;
      padding: 4px 12px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.9rem;
      min-height: 36px;
    }
    button:hover:not(:disabled) { background: #000; color: #fff; }
    button:disabled { opacity: 0.35; cursor: default; }

    input[type="text"] {
      border: 1px solid #000;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 0.9rem;
      width: 160px;
      height: 36px;
    }
    input[type="number"] {
      border: 1px solid #000;
      padding: 3px 4px;
      font-family: monospace;
      font-size: 0.9rem;
      width: 60px;
      text-align: center;
    }
    select {
      border: 1px solid #000;
      padding: 4px 6px;
      font-family: monospace;
      font-size: 0.9rem;
      background: #fff;
      height: 36px;
    }

    .top-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .add-row  { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
    .player-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; min-height: 28px; }
    .player-tag {
      border: 1px solid #000;
      padding: 2px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
    }
    .rm-btn { border: none; background: none; cursor: pointer; font-size: 1rem; padding: 0 2px; line-height: 1; font-family: monospace; min-height: unset; }
    .rm-btn:hover { background: #000; color: #fff; }
    .dealer-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; font-size: 0.9rem; }

    .table-wrapper { overflow-x: auto; margin-bottom: 12px; }
    table { border-collapse: collapse; min-width: 100%; }
    th, td { border: 1px solid #000; padding: 6px 10px; text-align: center; white-space: nowrap; }
    thead th { background: #000; color: #fff; }
    thead th.phase-row { background: #444; font-size: 0.75rem; font-weight: normal; }
    tbody tr.totals td { font-weight: bold; border-top: 2px solid #000; }
    tbody tr.current td { background: #eee; }

    .score-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .phase-check { display: flex; align-items: center; gap: 3px; font-size: 0.75rem; white-space: nowrap; }
    .phase-check input[type="checkbox"] { cursor: pointer; width: 14px; height: 14px; }

    .submit-row { display: flex; justify-content: flex-end; margin-bottom: 16px; }
    .winner { border: 2px solid #000; padding: 10px 16px; margin-bottom: 16px; font-weight: bold; }
    .hint { font-size: 0.85rem; margin-top: 8px; }

    .phase-ref {
      border: 1px solid #ccc;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 0.78rem;
      line-height: 1.7;
    }
    .phase-ref summary { cursor: pointer; font-weight: bold; font-size: 0.85rem; }

    @media (max-width: 480px) {
      body { padding: 14px; }
      input[type="number"] { width: 50px; }
    }
  </style>
</head>
<body>
  <nav><a href="/">← Home</a></nav>
  <h1>Phase 10</h1>

  <div class="top-bar">
    <button id="btn-new">New Game</button>
    <button id="btn-undo" disabled>Undo</button>
  </div>

  <div id="app"></div>

  <script>
    const PHASES = [
      '2 sets of 3',
      '1 set of 3 + 1 run of 4',
      '1 set of 4 + 1 run of 4',
      '1 run of 7',
      '1 run of 8',
      '1 run of 9',
      '2 sets of 4',
      '7 cards of one color',
      '1 set of 5 + 1 set of 2',
      '1 set of 5 + 1 set of 3',
    ];

    let state = blankState();
    let history = [];

    function blankState() {
      return {
        phase: 'setup',
        players: [],
        firstDealerIndex: 0,
        playerPhases: [],  // 1-indexed (1 = Phase 1, ..., 10 = Phase 10, 11 = done)
        rounds: [],        // { roundIndex, dealerIndex, scores: number[], advanced: boolean[] }
      };
    }

    function snapshot() { history.push(JSON.stringify(state)); }
    function mutate(fn) { snapshot(); fn(); render(); }

    // ── Actions ───────────────────────────────────────────────────────────────

    function addPlayer(name) {
      name = name.trim();
      if (!name) return false;
      mutate(() => { state.players = [...state.players, name]; state.playerPhases = [...state.playerPhases, 1]; });
      return true;
    }

    function removePlayer(idx) {
      mutate(() => {
        const next = state.players.filter((_, i) => i !== idx);
        const nextPhases = state.playerPhases.filter((_, i) => i !== idx);
        let d = state.firstDealerIndex;
        if (idx < d) d -= 1;
        else if (idx === d) d = 0;
        if (d >= next.length) d = 0;
        state.players = next;
        state.playerPhases = nextPhases;
        state.firstDealerIndex = d;
      });
    }

    function setDealer(idx) { mutate(() => { state.firstDealerIndex = idx; }); }

    function startGame() {
      if (state.players.length < 2) return;
      mutate(() => { state.phase = 'playing'; });
    }

    function submitRound(scores, advanced) {
      const roundIndex = state.rounds.length;
      const dealerIndex = dealerFor(roundIndex);
      mutate(() => {
        const newPhases = state.playerPhases.map((p, i) => advanced[i] ? p + 1 : p);
        state.rounds = [...state.rounds, { roundIndex, dealerIndex, scores, advanced }];
        state.playerPhases = newPhases;
        if (newPhases.some(p => p > 10)) state.phase = 'complete';
      });
    }

    function resetGame() { snapshot(); state = blankState(); render(); }
    function undo() { if (!history.length) return; state = JSON.parse(history.pop()); render(); }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function dealerFor(roundIndex) {
      return (state.firstDealerIndex + roundIndex) % state.players.length;
    }

    function runningTotals() {
      return state.players.map((_, pi) =>
        state.rounds.reduce((sum, r) => sum + (r.scores[pi] ?? 0), 0)
      );
    }

    function el(tag, props = {}) {
      const e = document.createElement(tag);
      Object.assign(e, props);
      return e;
    }
    function makeTh(text, cls) { const t = el('th'); t.textContent = text; if (cls) t.className = cls; return t; }
    function makeTd(text) { const t = el('td'); t.textContent = text; return t; }

    // ── Phase renderers ───────────────────────────────────────────────────────

    function renderSetup() {
      const wrap = el('div');

      // Phase reference
      const details = el('details', { className: 'phase-ref' });
      const summary = el('summary'); summary.textContent = 'Phase reference'; details.appendChild(summary);
      PHASES.forEach((desc, i) => {
        const p = el('div');
        p.textContent = `Phase ${i + 1}: ${desc}`;
        details.appendChild(p);
      });
      wrap.appendChild(details);

      const addRow = el('div', { className: 'add-row' });
      const nameInput = el('input', { type: 'text', placeholder: 'Player name' });
      const addBtn = el('button', { textContent: 'Add Player' });
      addBtn.onclick = () => { if (addPlayer(nameInput.value)) nameInput.value = ''; nameInput.focus(); };
      nameInput.onkeydown = e => { if (e.key === 'Enter') addBtn.click(); };
      addRow.append(nameInput, addBtn);
      wrap.appendChild(addRow);

      const tags = el('div', { className: 'player-tags' });
      state.players.forEach((name, i) => {
        const tag = el('div', { className: 'player-tag' });
        tag.appendChild(document.createTextNode(name));
        const rm = el('button', { className: 'rm-btn', textContent: '×', title: 'Remove' });
        rm.onclick = () => removePlayer(i);
        tag.appendChild(rm);
        tags.appendChild(tag);
      });
      wrap.appendChild(tags);

      if (state.players.length >= 2) {
        const dealerRow = el('div', { className: 'dealer-row' });
        dealerRow.appendChild(document.createTextNode('First dealer: '));
        const sel = el('select');
        state.players.forEach((name, i) => {
          const opt = el('option', { value: i, textContent: name });
          if (i === state.firstDealerIndex) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.onchange = () => setDealer(+sel.value);
        dealerRow.appendChild(sel);
        wrap.appendChild(dealerRow);
        const startBtn = el('button', { textContent: 'Start Game' });
        startBtn.onclick = startGame;
        wrap.appendChild(startBtn);
      } else {
        wrap.appendChild(el('p', { className: 'hint', textContent: 'Add at least 2 players to start.' }));
      }

      return wrap;
    }

    function buildTable(showInputRow) {
      const wrapper = el('div', { className: 'table-wrapper' });
      const table = el('table');

      // Header row: player names
      const thead = el('thead');
      const hrow = el('tr');
      ['Round', 'Dealer', ...state.players].forEach(t => hrow.appendChild(makeTh(t)));
      thead.appendChild(hrow);

      // Phase sub-header
      const phrow = el('tr');
      phrow.appendChild(makeTh('', 'phase-row'));
      phrow.appendChild(makeTh('', 'phase-row'));
      state.playerPhases.forEach(p => {
        const t = makeTh(p <= 10 ? `Phase ${p}` : 'Done!', 'phase-row');
        phrow.appendChild(t);
      });
      thead.appendChild(phrow);
      table.appendChild(thead);

      const tbody = el('tbody');

      state.rounds.forEach(r => {
        const tr = el('tr');
        tr.appendChild(makeTd(r.roundIndex + 1));
        tr.appendChild(makeTd(state.players[r.dealerIndex]));
        r.scores.forEach((score, i) => {
          const td = el('td');
          td.textContent = score;
          if (r.advanced[i]) {
            const badge = el('span');
            badge.textContent = ' ✓';
            badge.title = 'Completed phase';
            td.appendChild(badge);
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      let currentInputs = null;
      let currentChecks = null;
      if (showInputRow) {
        const ri = state.rounds.length;
        const tr = el('tr', { className: 'current' });
        tr.appendChild(makeTd(ri + 1));
        tr.appendChild(makeTd(state.players[dealerFor(ri)]));
        currentInputs = [];
        currentChecks = [];
        state.players.forEach((_, i) => {
          const td = el('td');
          const cell = el('div', { className: 'score-cell' });

          const inp = el('input');
          inp.type = 'number'; inp.min = '0'; inp.placeholder = '0';
          inp.setAttribute('inputmode', 'numeric');
          currentInputs.push(inp);

          const checkRow = el('label', { className: 'phase-check' });
          const chk = el('input'); chk.type = 'checkbox';
          currentChecks.push(chk);
          const phaseNum = state.playerPhases[i];
          checkRow.appendChild(chk);
          checkRow.appendChild(document.createTextNode(` Ph.${phaseNum}`));

          cell.append(inp, checkRow);
          td.appendChild(cell);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }

      const tots = runningTotals();
      const totRow = el('tr', { className: 'totals' });
      totRow.appendChild(makeTd('Total'));
      totRow.appendChild(makeTd(''));
      tots.forEach(v => totRow.appendChild(makeTd(v)));
      tbody.appendChild(totRow);

      table.appendChild(tbody);
      wrapper.appendChild(table);
      return { wrapper, currentInputs, currentChecks };
    }

    function renderPlaying() {
      const wrap = el('div');

      // Phase ref collapsible
      const details = el('details', { className: 'phase-ref' });
      const summary = el('summary'); summary.textContent = 'Phase reference'; details.appendChild(summary);
      PHASES.forEach((desc, i) => {
        const p = el('div');
        p.textContent = `Phase ${i + 1}: ${desc}`;
        details.appendChild(p);
      });
      wrap.appendChild(details);

      const { wrapper, currentInputs, currentChecks } = buildTable(true);
      wrap.appendChild(wrapper);

      const submitRow = el('div', { className: 'submit-row' });
      const submitBtn = el('button', { textContent: 'Submit Round' });
      submitBtn.onclick = () => {
        const scores = currentInputs.map(inp => {
          const v = parseInt(inp.value, 10);
          return isNaN(v) ? 0 : Math.max(0, v);
        });
        const advanced = currentChecks.map(chk => chk.checked);
        submitRound(scores, advanced);
      };
      submitRow.appendChild(submitBtn);
      wrap.appendChild(submitRow);
      return wrap;
    }

    function renderComplete() {
      const wrap = el('div');
      const tots = runningTotals();
      // Winners are players who completed phase 10
      const finishers = state.players
        .map((name, i) => ({ name, total: tots[i], phase: state.playerPhases[i] }))
        .filter(p => p.phase > 10);
      const minScore = Math.min(...finishers.map(p => p.total));
      const winners = finishers.filter(p => p.total === minScore);
      const banner = el('div', { className: 'winner' });
      banner.textContent = winners.length === 1
        ? `Winner: ${winners[0].name} — ${minScore} pts`
        : `Tie: ${winners.map(w => w.name).join(' & ')} — ${minScore} pts`;
      wrap.appendChild(banner);
      const { wrapper } = buildTable(false);
      wrap.appendChild(wrapper);
      return wrap;
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';
      if (state.phase === 'setup') app.appendChild(renderSetup());
      else if (state.phase === 'playing') app.appendChild(renderPlaying());
      else app.appendChild(renderComplete());
      document.getElementById('btn-undo').disabled = history.length === 0;
    }

    document.getElementById('btn-new').onclick = resetGame;
    document.getElementById('btn-undo').onclick = undo;
    render();
  </script>
</body>
</html>
