<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Crowns</title>
  <style>
    :root {
      --primary:       #4a1878;
      --primary-dark:  #3b1261;
      --primary-light: #f3ecfa;
      --accent:        #f4c430;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #fff; color: #000; }

    .page-header { background: var(--primary); padding: 12px 20px 16px; }
    .back-link { display: block; color: rgba(255,255,255,0.7); font-size: 0.8rem; text-decoration: none; margin-bottom: 6px; }
    .back-link:hover { color: #fff; }
    .page-header h1 { color: #fff; font-size: 1.4rem; }

    main { padding: 20px; max-width: 760px; margin: 0 auto; }

    button {
      border: 1px solid #000;
      background: #fff;
      color: #000;
      padding: 4px 12px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.9rem;
    }
    button:hover:not(:disabled) { background: #000; color: #fff; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.primary:hover:not(:disabled) { background: var(--primary-dark); border-color: var(--primary-dark); }

    input[type="text"] {
      border: 1px solid #000;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 0.9rem;
      width: 160px;
      height: 36px;
    }
    .entry-table input {
      border: 1px solid #ccc;
      padding: 4px 6px;
      font-family: monospace;
      font-size: 1rem;
      width: 72px;
      text-align: center;
    }
    select {
      border: 1px solid #000;
      padding: 4px 6px;
      font-family: monospace;
      font-size: 0.9rem;
      background: #fff;
      height: 36px;
    }

    .top-bar    { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .add-row    { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
    .player-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; min-height: 28px; }
    .player-tag {
      border: 1px solid var(--primary);
      background: var(--primary-light);
      padding: 2px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
    }
    .rm-btn { border: none; background: none; cursor: pointer; font-size: 1rem; padding: 0 2px; line-height: 1; font-family: monospace; color: var(--primary); }
    .rm-btn:hover { background: var(--primary); color: #fff; }
    .dealer-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; font-size: 0.9rem; }
    .hint { font-size: 0.85rem; margin-top: 8px; color: #555; }

    /* Score entry form */
    .round-info {
      font-size: 0.9rem;
      font-weight: bold;
      padding: 8px 12px;
      margin-bottom: 10px;
      background: var(--primary-light);
      border-left: 3px solid var(--primary);
      color: var(--primary);
    }
    .entry-table { border-collapse: collapse; margin-bottom: 10px; }
    .entry-table td { border: 1px solid #ccc; padding: 6px 10px; }
    .entry-name { background: var(--primary-light); text-align: left; min-width: 100px; }
    .submit-row { display: flex; justify-content: flex-end; margin-bottom: 20px; }

    /* History table */
    .table-wrapper { overflow-x: auto; }
    table.score-history { border-collapse: collapse; min-width: 100%; }
    table.score-history th, table.score-history td { border: 1px solid #ccc; padding: 6px 10px; text-align: center; white-space: nowrap; }
    table.score-history thead th { background: var(--primary); color: #fff; border-color: var(--primary-dark); }
    table.score-history .player-name { text-align: left; }
    table.score-history .player-total { font-weight: bold; background: var(--primary-light); }
    table.score-history tbody tr:nth-child(even) { background: #fafafa; }
    /* Sticky player name column */
    table.score-history th:first-child { position: sticky; left: 0; z-index: 2; background: var(--primary); }
    table.score-history td:first-child { position: sticky; left: 0; z-index: 1; background: #fff; }
    table.score-history tbody tr:nth-child(even) td:first-child { background: #fafafa; }
    .dealer-hist td:first-child { background: #fff !important; }
    /* Sticky total column */
    table.score-history th:last-child { position: sticky; right: 0; z-index: 2; background: var(--primary); border-left: 2px solid var(--primary-dark); }
    table.score-history td:last-child { position: sticky; right: 0; z-index: 1; border-left: 2px solid #bbb; }
    table.score-history .player-total { background: var(--primary-light); }
    .dealer-hist td:last-child { background: #fff !important; }

    .winner {
      border: 2px solid var(--accent);
      background: var(--primary);
      color: var(--accent);
      padding: 12px 16px;
      margin-bottom: 16px;
      font-weight: bold;
      font-size: 1.05rem;
    }

    table.score-history td.editable-score { cursor: pointer; }
    table.score-history td.editable-score:hover:not(:has(input)) { background: rgba(0,0,0,0.04); }
    .score-edit-input { width: 54px; border: 1px solid #999; padding: 2px 4px; font-family: monospace; font-size: 0.85rem; text-align: center; background: #fff; }
    .dealer-hist td { font-size: 0.8rem; color: #555; font-style: italic; }
    .next-player-btn { border: 1px solid #ccc; background: #f0f0f0; color: #555; padding: 2px 8px; font-family: monospace; font-size: 0.9rem; min-height: 36px; margin-left: 4px; cursor: pointer; vertical-align: middle; }
    .next-player-btn:hover { background: #000; color: #fff; border-color: #000; }

    @media (max-width: 480px) {
      main { padding: 14px; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="/" class="back-link">← Home</a>
    <h1>Five Crowns</h1>
  </header>

  <main>
    <div class="top-bar">
      <button id="btn-new">New Game</button>
      <button id="btn-undo" disabled>Undo</button>
    </div>
    <div id="app"></div>
  </main>

  <script>
    const ROUNDS = [
      { num: 1,  wild: '3s'     },
      { num: 2,  wild: '4s'     },
      { num: 3,  wild: '5s'     },
      { num: 4,  wild: '6s'     },
      { num: 5,  wild: '7s'     },
      { num: 6,  wild: '8s'     },
      { num: 7,  wild: '9s'     },
      { num: 8,  wild: '10s'    },
      { num: 9,  wild: 'Jacks'  },
      { num: 10, wild: 'Queens' },
      { num: 11, wild: 'Kings'  },
    ];

    const STORAGE_KEY = 'five-crowns-state';
    function saveToStorage() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }
    function loadFromStorage() {
      try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; }
    }

    let state = loadFromStorage() || blankState();
    let history = [];

    function blankState() {
      return { phase: 'setup', players: [], firstDealerIndex: 0, rounds: [] };
    }

    function snapshot() { history.push(JSON.stringify(state)); }
    function mutate(fn) { snapshot(); fn(); render(); }

    function addPlayer(name) {
      name = name.trim();
      if (!name) return;
      mutate(() => { state.players = [...state.players, name]; });
      document.getElementById('player-name-input')?.focus();
    }

    function removePlayer(idx) {
      mutate(() => {
        const next = state.players.filter((_, i) => i !== idx);
        let d = state.firstDealerIndex;
        if (idx < d) d -= 1;
        else if (idx === d) d = 0;
        if (d >= next.length) d = 0;
        state.players = next;
        state.firstDealerIndex = d;
      });
    }

    function setDealer(idx)   { mutate(() => { state.firstDealerIndex = idx; }); }
    function startGame()      { if (state.players.length >= 2) mutate(() => { state.phase = 'playing'; }); }
    function resetGame()      { snapshot(); state = blankState(); render(); }
    function undo()           { if (history.length) { state = JSON.parse(history.pop()); render(); } }
    function editScore(roundIdx, playerIdx, value) {
      mutate(() => { state.rounds[roundIdx].scores[playerIdx] = value; });
    }

    function submitRound(scores) {
      const roundIndex = state.rounds.length;
      mutate(() => {
        state.rounds = [...state.rounds, { roundIndex, dealerIndex: dealerFor(roundIndex), scores }];
        if (state.rounds.length === ROUNDS.length) state.phase = 'complete';
      });
    }

    function dealerFor(ri) { return (state.firstDealerIndex + ri) % state.players.length; }

    function runningTotals() {
      return state.players.map((_, pi) =>
        state.rounds.reduce((s, r) => s + (r.scores[pi] ?? 0), 0)
      );
    }

    function el(tag, props = {}) {
      const e = document.createElement(tag);
      Object.assign(e, props);
      return e;
    }
    function makeTh(text) { const t = el('th'); t.textContent = text; return t; }
    function makeTd(text) { const t = el('td'); t.textContent = text; return t; }
    function makeScoreTd(value, roundIdx, playerIdx) {
      const td = el('td', { className: 'editable-score' });
      td.textContent = value;
      td.onclick = () => {
        if (td.querySelector('input')) return;
        td.textContent = '';
        const inp = el('input', { className: 'score-edit-input' });
        inp.type = 'text'; inp.value = value;
        inp.setAttribute('inputmode', 'numeric');
        const commit = () => {
          const v = parseInt(inp.value, 10);
          editScore(roundIdx, playerIdx, isNaN(v) ? 0 : Math.max(0, v));
        };
        inp.onblur = commit;
        inp.onkeydown = e => {
          if (e.key === 'Enter') inp.blur();
          if (e.key === 'Escape') { inp.onblur = null; td.textContent = value; }
        };
        td.appendChild(inp);
        inp.focus(); inp.select();
      };
      return td;
    }

    // ── Setup ─────────────────────────────────────────────────────────────────

    function renderSetup() {
      const wrap = el('div');

      const addRow = el('div', { className: 'add-row' });
      const nameInput = el('input', { type: 'text', placeholder: 'Player name', id: 'player-name-input' });
      const addBtn = el('button', { textContent: 'Add Player' });
      addBtn.onclick = () => addPlayer(nameInput.value);
      nameInput.onkeydown = e => { if (e.key === 'Enter') addPlayer(nameInput.value); };
      addRow.append(nameInput, addBtn);
      wrap.appendChild(addRow);

      const tags = el('div', { className: 'player-tags' });
      state.players.forEach((name, i) => {
        const tag = el('div', { className: 'player-tag' });
        tag.appendChild(document.createTextNode(name));
        const rm = el('button', { className: 'rm-btn', textContent: '×', title: 'Remove' });
        rm.onclick = () => removePlayer(i);
        tag.appendChild(rm);
        tags.appendChild(tag);
      });
      wrap.appendChild(tags);

      if (state.players.length >= 2) {
        const dealerRow = el('div', { className: 'dealer-row' });
        dealerRow.appendChild(document.createTextNode('First dealer: '));
        const sel = el('select');
        state.players.forEach((name, i) => {
          const opt = el('option', { value: i, textContent: name });
          if (i === state.firstDealerIndex) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.onchange = () => setDealer(+sel.value);
        dealerRow.appendChild(sel);
        wrap.appendChild(dealerRow);
        const startBtn = el('button', { className: 'primary', textContent: 'Start Game' });
        startBtn.onclick = startGame;
        wrap.appendChild(startBtn);
      } else {
        wrap.appendChild(el('p', { className: 'hint', textContent: 'Add at least 2 players to start.' }));
      }

      return wrap;
    }

    // ── Score entry (stacked, mobile-friendly) ────────────────────────────────

    function buildScoreEntry() {
      const ri = state.rounds.length;
      if (ri >= ROUNDS.length) return null;

      const cfg = ROUNDS[ri];
      const wrap = el('div');

      const info = el('div', { className: 'round-info' });
      info.textContent = `Round ${cfg.num} · Wild: ${cfg.wild} · Dealer: ${state.players[dealerFor(ri)]}`;
      wrap.appendChild(info);

      const table = el('table', { className: 'entry-table' });
      const tbody = el('tbody');

      const inputs = state.players.map(name => {
        const tr = el('tr');
        tr.appendChild(el('td', { className: 'entry-name', textContent: name }));
        const inp = el('input');
        inp.type = 'text'; inp.placeholder = '0';
        inp.setAttribute('inputmode', 'numeric');
        const td = el('td');
        td.appendChild(inp);
        tr.appendChild(td);
        tbody.appendChild(tr);
        return inp;
      });

      table.appendChild(tbody);
      wrap.appendChild(table);

      const submitRow = el('div', { className: 'submit-row' });
      const btn = el('button', { className: 'primary', textContent: 'Submit Round' });
      inputs.forEach((inp, i) => {
        inp.setAttribute('enterkeyhint', 'next');
        const advance = () => {
          if (i + 1 < inputs.length) { inputs[i + 1].focus(); inputs[i + 1].select(); }
          else btn.focus();
        };
        const nextBtn = el('button', { className: 'next-player-btn', textContent: '→' });
        nextBtn.type = 'button';
        nextBtn.onclick = advance;
        inp.parentElement.appendChild(nextBtn);
        inp.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); advance(); } };
      });
      btn.onclick = () => submitRound(inputs.map(inp => {
        const v = parseInt(inp.value, 10);
        return isNaN(v) ? 0 : Math.max(0, v);
      }));
      submitRow.appendChild(btn);
      wrap.appendChild(submitRow);

      return wrap;
    }

    // ── History table (transposed: players as rows) ───────────────────────────

    function buildHistoryTable() {
      if (state.rounds.length === 0) return null;

      const wrapper = el('div', { className: 'table-wrapper' });
      const table = el('table', { className: 'score-history' });

      const thead = el('thead');
      const hrow = el('tr');
      hrow.appendChild(makeTh('Player'));
      state.rounds.forEach(r => {
        const cfg = ROUNDS[r.roundIndex];
        const th = makeTh(cfg.wild);
        th.title = `Round ${cfg.num} · Dealer: ${state.players[r.dealerIndex]}`;
        hrow.appendChild(th);
      });
      hrow.appendChild(makeTh('Total'));
      thead.appendChild(hrow);
      table.appendChild(thead);

      const tbody = el('tbody');
      const tots = runningTotals();

      const dealerTr = el('tr', { className: 'dealer-hist' });
      dealerTr.appendChild(el('td', { className: 'player-name', textContent: 'Dealer' }));
      state.rounds.forEach(r => dealerTr.appendChild(makeTd(state.players[r.dealerIndex])));
      dealerTr.appendChild(makeTd(''));
      tbody.appendChild(dealerTr);

      state.players.forEach((name, pi) => {
        const tr = el('tr');
        tr.appendChild(el('td', { className: 'player-name', textContent: name }));
        state.rounds.forEach((r, ri) => tr.appendChild(makeScoreTd(r.scores[pi], ri, pi)));
        tr.appendChild(el('td', { className: 'player-total', textContent: tots[pi] }));
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      wrapper.appendChild(table);
      return wrapper;
    }

    // ── Phase renderers ───────────────────────────────────────────────────────

    function renderPlaying() {
      const wrap = el('div');
      const entry = buildScoreEntry();
      if (entry) wrap.appendChild(entry);
      const hist = buildHistoryTable();
      if (hist) wrap.appendChild(hist);
      return wrap;
    }

    function renderComplete() {
      const wrap = el('div');
      const tots = runningTotals();
      const min = Math.min(...tots);
      const winners = state.players.filter((_, i) => tots[i] === min);
      const banner = el('div', { className: 'winner' });
      banner.textContent = winners.length === 1
        ? `♛ Winner: ${winners[0]} — ${min} pts`
        : `♛ Tie: ${winners.join(' & ')} — ${min} pts`;
      wrap.appendChild(banner);
      const hist = buildHistoryTable();
      if (hist) wrap.appendChild(hist);
      return wrap;
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';
      if (state.phase === 'setup')         app.appendChild(renderSetup());
      else if (state.phase === 'playing')  app.appendChild(renderPlaying());
      else                                 app.appendChild(renderComplete());
      document.getElementById('btn-undo').disabled = history.length === 0;
      saveToStorage();
      requestAnimationFrame(() => {
        const wrapper = document.querySelector('.table-wrapper');
        if (wrapper) wrapper.scrollLeft = wrapper.scrollWidth;
      });
    }

    document.getElementById('btn-new').onclick = resetGame;
    document.getElementById('btn-undo').onclick = undo;
    render();
  </script>
</body>
</html>
