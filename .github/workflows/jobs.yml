name: Job Research

on:
  schedule:
    - cron: '0 16 * * 1-5'  # ~12 PM ET on weekdays
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r _scripts/jobs/requirements.txt

      - name: Generate job research
        run: python _scripts/jobs/generate_jobs.py
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find jobs -maxdepth 1 -name '[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].json' -exec git add -- {} +
          git add jobs/index.html
          git add _scripts/jobs/seen_companies.json
          git diff --staged --quiet || git commit -m "Update job research"
          git pull --rebase
          git push
