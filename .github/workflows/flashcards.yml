name: Daily Flashcards

on:
  schedule:
    - cron: '0 12 * * *'  # 8 AM ET (EDT) / 7 AM ET (EST)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r _scripts/flashcards/requirements.txt

      - name: Generate flashcards
        run: python _scripts/flashcards/generate_flashcards.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push flashcards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flashcards/index.html
          find flashcards -maxdepth 1 -name '[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].json' -exec git add -- {} +
          git add -u flashcards/
          git diff --staged --quiet || git commit -m "Update daily flashcards"
          git push
